      assistant.\\n\\n## Core Responsibilities\\nYou help users with:\\n- Creating
      parking reservations. Before creating reservation, collect user's plate number.\\n-
      Providing details on available parking garages and their parking spaces.\\n-
      Providing information about parking rates, hours, and other details.\\n\\n##
      Guidelines\\n1. Always use the provided tools to fetch real-time information
      about availability, pricing, and reservations\\n2. Never guess or make up information
      \u2014 if a tool doesn't provide the answer, say you don't have that information\\n3.
      Confirm important details (date, time, location, vehicle info) before finalizing
      any reservation\\n4. Provide clear pricing breakdowns when discussing costs\\n5.
      Be concise but thorough in your responses\\n\\n## Boundaries\\nYou MUST politely
      decline to answer questions unrelated to parking reservations. This includes
      but is not limited to:\\n- General knowledge questions\\n- Navigation or driving
      directions (beyond parking location addresses)\\n- Topics about other services,
      entertainment, or recommendations\\n- Personal advice or opinions\\n\\nWhen
      declining, briefly explain that you're specialized in parking reservations and
      offer to help with\\nparking-related queries instead.\\n\\n## Tone\\nBe professional,
      helpful, and efficient. Users are often in a hurry when managing parking, so
      respect their time while\\nensuring accuracy.\\n\",\"role\":\"system\"},{\"content\":\"What
      can you do?\",\"role\":\"user\"}],\"model\":\"gpt-4\",\"stream\":false,\"temperature\":0.3,\"tools\":[{\"type\":\"function\",\"function\":{\"name\":\"list_garages_by_name\",\"description\":\"Return
      names of available parking garages\",\"parameters\":{\"properties\":{},\"type\":\"object\"}}},{\"type\":\"function\",\"function\":{\"name\":\"get_garage_details_by_name\",\"description\":\"Return
      garage details (working hours, address, description) by name\",\"parameters\":{\"properties\":{\"garage_name\":{\"type\":\"string\"}},\"required\":[\"garage_name\"],\"type\":\"object\"}}},{\"type\":\"function\",\"function\":{\"name\":\"get_parking_spaces_by_garage\",\"description\":\"Return
      parking spaces present in garage\",\"parameters\":{\"properties\":{\"garage_name\":{\"type\":\"string\"}},\"required\":[\"garage_name\"],\"type\":\"object\"}}},{\"type\":\"function\",\"function\":{\"name\":\"make_reservation\",\"description\":\"Create
      a reservation for parking space.\\nMust ask user for:\\n- parking space name
      for reservation\\n- name and surname\\n- car plate number\\n- reservation period\",\"parameters\":{\"properties\":{\"plate_number\":{\"type\":\"string\"},\"user_name\":{\"type\":\"string\"},\"user_surname\":{\"type\":\"string\"},\"parking_space_name\":{\"type\":\"string\"},\"reservation_period\":{\"type\":\"string\"}},\"required\":[\"plate_number\",\"user_name\",\"user_surname\",\"parking_space_name\",\"reservation_period\"],\"type\":\"object\"}}},{\"type\":\"function\",\"function\":{\"name\":\"list_reservations\",\"description\":\"Return
      all current reservations\",\"parameters\":{\"properties\":{},\"type\":\"object\"}}},{\"type\":\"function\",\"function\":{\"name\":\"check_reservation\",\"description\":\"Check
