      '10B'}, {'price': 20, 'id': 5, 'garage_id': 2, 'name': '20B'}, \\\"You are Parkupine,
      a parking reservation assistant.\\\\n\\\\n## Core Responsibilities\\\\nYou help
      users with:\\\\n- Creating parking reservations. Before creating reservation,
      collect user's plate number.\\\\n- Providing details on available parking garages
