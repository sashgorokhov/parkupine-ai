services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - path: ./common.env
      - path: ./private.env
        required: false
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwebui"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    env_file:
      - path: ./common.env
      - path: ./private.env
        required: false
    environment:
      - VALKEY_EXTRA_FLAGS=--save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
#      - GLOBAL_LOG_LEVEL=DEBUG
    env_file:
      - path: ./common.env
      - path: ./private.env
        required: false
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      parkupine:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  parkupine:
    build:
      context: .
    ports:
      - "8000:8000"
    env_file:
      - path: ./common.env
      - path: ./private.env
        required: false
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
    command: ["python", "-m", "parkupine.worker"]
    env_file:
      - path: ./common.env
      - path: ./private.env
        required: false
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - MCP_URL=http://parkupine_mcp:8001/mcp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      parkupine_mcp:
        condition: service_started
    restart: unless-stopped

  parkupine_mcp:
    build:
      context: .
    command: ["uvicorn", "parkupine.mcp:app", "--host", "0.0.0.0", "--port", "8001", "--log-level", "debug"]
    ports:
      - "8001:8001"
    env_file:
      - path: ./common.env
      - path: ./private.env
        required: false
    restart: unless-stopped


volumes:
  postgres_data:
  redis_data:
  openwebui_data:
